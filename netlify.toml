# Netlify configuration for the Kovo-Sklo website.
#
# This repo was historically a vanilla HTML site. It has now been rebuilt as a
# Next.js app that lives in /nextjs-app. Netlify builds from that directory.
# The old HTML files remain at the repo root only as reference — they are NOT
# published (Netlify's `base` below is what gets deployed).

[build]
  # Netlify cd's into this directory before running the command below.
  base = "nextjs-app"
  # `npm install` runs automatically; then this command runs.
  command = "npm run build"
  # The Next.js build output directory (relative to `base`).
  publish = ".next"

# The official Next.js runtime plugin handles SSR, static + ISR pages,
# image optimization, middleware and rewrites.
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Long-lived cache for anything served from /sources/* and Next.js static assets.
[[headers]]
  for = "/sources/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.md"
  [headers.values]
    X-Robots-Tag = "noindex"
